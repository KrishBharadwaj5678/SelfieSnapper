<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="manifest" href="./public/manifest.json" />
    <title>Selfie Snapper | Capture Selfies Online</title>
    <!-- SEO Tags -->
    <meta
      name="description"
      content="Selfie Snapper allows users to take selfies using their webcam. Capture your favorite moments and download them instantly!"
    />
    <meta
      name="keywords"
      content="selfie snapper, webcam photo, online camera, take selfie online, capture photo browser, webcam app, html, css, javascript, web development, front-end project"
    />
    <meta name="author" content="Krish Bharadwaj" />
    <meta name="robots" content="index, follow, max-image-preview:large" />

    <!-- Canonical -->
    <link rel="canonical" href="https://selfiesnapper.netlify.app/" />

    <!-- Mobile & PWA -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta
      name="apple-mobile-web-app-status-bar-style"
      content="black-translucent"
    />
    <meta name="apple-mobile-web-app-title" content="Selfie Snapper" />
    <meta name="mobile-web-app-capable" content="yes" />

    <!-- JSON-LD Structured Data -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "WebSite",
        "name": "Selfie Snapper",
        "url": "https://selfiesnapper.netlify.app/",
        "description": "Selfie Snapper allows users to take selfies using their webcam. Capture your favorite moments and download them instantly!",
        "inLanguage": "en",
        "publisher": {
          "@type": "Person",
          "name": "Krish Bharadwaj"
        }
      }
    </script>
    <!-- Favicon -->
    <link
      rel="icon"
      type="image/png"
      href="./public/favicon/favicon-96x96.png"
      sizes="96x96"
    />
    <link rel="icon" type="image/svg+xml" href="./public/favicon/favicon.svg" />
    <link rel="shortcut icon" href="./public/favicon/favicon.ico" />
    <link
      rel="apple-touch-icon"
      sizes="180x180"
      href="./public/favicon/apple-touch-icon.png"
    />
    <meta name="apple-mobile-web-app-title" content="Selfie Snapper" />
    <link rel="manifest" href="./public/favicon/site.webmanifest" />
    <link rel="stylesheet" href="./style/index.css" />
    <link rel="stylesheet" href="./style/responsive.css" />
    <link rel="stylesheet" href="./style/capture.css" />
    <link rel="stylesheet" href="./style/loader.css" />
  </head>
  <body>
    <!-- Loader Overlay -->
    <div class="loader-overlay" id="loaderOverlay">
      <div class="newtons-cradle">
        <div class="newtons-cradle__dot"></div>
        <div class="newtons-cradle__dot"></div>
        <div class="newtons-cradle__dot"></div>
        <div class="newtons-cradle__dot"></div>
      </div>
    </div>

    <video></video>
    <!-- Capture Button -->
    <div class="btn-wrapper">
      <input id="capture-toggle" class="btn-cbox" type="checkbox" />
      <label for="capture-toggle" class="btn">
        <span class="letter">C</span>
        <span class="letter">a</span>
        <span class="letter">p</span>
        <span class="letter">t</span>
        <span class="letter">u</span>
        <span class="letter">r</span>
        <span class="letter">e</span>
        <div class="shutter-wrapper">
          <span class="shutter s-1"></span>
          <span class="shutter s-2"></span>
          <span class="shutter s-3"></span>
          <span class="shutter s-4"></span>
          <span class="shutter s-5"></span>
          <span class="shutter s-6"></span>
        </div>
      </label>
      <div class="flash"></div>
    </div>
    <script src="./scripts/index.js" defer type="module"></script>
  </body>
</html>
